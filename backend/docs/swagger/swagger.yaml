basePath: /api/v1
definitions:
  models.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  models.CreateBidRequest:
    properties:
      answers:
        additionalProperties:
          type: string
        type: object
      estimated_completion:
        type: string
      message:
        minLength: 10
        type: string
    required:
    - estimated_completion
    - message
    type: object
  models.CreateTaskRequest:
    properties:
      deadline:
        type: string
      description:
        minLength: 10
        type: string
      org_id:
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/models.TaskPriority'
        enum:
        - low
        - medium
        - high
        - critical
      questions:
        items:
          type: string
        type: array
      skills:
        items:
          type: string
        type: array
      title:
        maxLength: 255
        minLength: 3
        type: string
    required:
    - deadline
    - description
    - priority
    - title
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.NotificationPrefsRequest:
    properties:
      bid_approved:
        type: boolean
      bid_placed:
        type: boolean
      bid_rejected:
        type: boolean
      deadline:
        type: boolean
      task_assigned:
        type: boolean
      task_comment:
        type: boolean
    type: object
  models.RateTaskRequest:
    properties:
      points:
        maximum: 10000
        minimum: 0
        type: integer
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - points
    - rating
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  models.TaskPriority:
    enum:
    - low
    - medium
    - high
    - critical
    type: string
    x-enum-varnames:
    - PriorityLow
    - PriorityMedium
    - PriorityHigh
    - PriorityCritical
  models.TaskStatus:
    enum:
    - open
    - assigned
    - in_progress
    - completed
    - closed
    type: string
    x-enum-varnames:
    - StatusOpen
    - StatusAssigned
    - StatusInProgress
    - StatusCompleted
    - StatusClosed
  models.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        maxLength: 500
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
      resume_url:
        type: string
      skills:
        items:
          type: string
        type: array
    type: object
  models.UpdateTaskRequest:
    properties:
      deadline:
        type: string
      description:
        minLength: 10
        type: string
      priority:
        allOf:
        - $ref: '#/definitions/models.TaskPriority'
        enum:
        - low
        - medium
        - high
        - critical
      questions:
        items:
          type: string
        type: array
      skills:
        items:
          type: string
        minItems: 1
        type: array
      status:
        allOf:
        - $ref: '#/definitions/models.TaskStatus'
        enum:
        - open
        - assigned
        - in_progress
        - completed
        - closed
      title:
        maxLength: 255
        minLength: 3
        type: string
    type: object
info:
  contact: {}
  description: API documentation for Task Delegation Platform.
  title: Task Delegation Platform API
  version: "1.0"
